<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <section class="container">
            <input class="container_input" type="text" id="campo">
            <div class="container_botao">
                <button class="container_botao_funcao" onclick="limpar()" type="button">AC</button>
                <button class="container_botao_funcao" onclick="backspace()" type="button">C</button>
                <button class="container_botao_funcao" onclick="porcentagem()" type="button">%</button>
                <button class="container_botao_operador" onclick="operadores('÷')" type="button">÷</button>
                <button onclick="display(7)" type="button">7</button>
                <button onclick="display(8)" type="button">8</button>
                <button onclick="display(9)" type="button">9</button>
                <button class="container_botao_operador" onclick="operadores('x')" type="button">x</button>
                <button onclick="display(4)" type="button">4</button>
                <button onclick="display(5)" type="button">5</button>
                <button onclick="display(6)" type="button">6</button>
                <button class="container_botao_operador" onclick="operadores('-')" type="button">-</button>
                <button onclick="display(1)" type="button">1</button>
                <button onclick="display(2)" type="button">2</button>
                <button onclick="display(3)" type="button">3</button>
                <button class="container_botao_operador" onclick="operadores('+')" type="button">+</button>
                <button onclick="display(0)" type="button">0</button>
                <button onclick="virgula(',')" type="button">,</button>
                <button class="container_botao_igual" onclick="calculadora()" type="button">=</button>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
